name: Build and publish Akuma Games

on:
  push:
    branches: [main]
    paths:
      - 'Jellyfin.Plugin.AkumaGames/**'
      - 'web/**'
      - 'unraid/**'
      - '.github/workflows/build-publish.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Validate web bridge syntax
        run: |
          node --check web/akuma-games-bridge.js
          node --check web/akuma-games-card-click.js

      - name: Build plugin
        run: |
          dotnet restore Jellyfin.Plugin.AkumaGames/Jellyfin.Plugin.AkumaGames.csproj
          dotnet build Jellyfin.Plugin.AkumaGames/Jellyfin.Plugin.AkumaGames.csproj -c Release --no-restore

      - name: Package plugin and persistent Unraid bridge
        run: |
          VERSION='0.2.3.6'
          PLUGIN_ZIP="Jellyfin.Plugin.AkumaGames_${VERSION}.zip"
          BUNDLE_NAME="AkumaGames-v${VERSION}-Unraid"

          mkdir -p repository/package
          cp Jellyfin.Plugin.AkumaGames/bin/Release/net9.0/Jellyfin.Plugin.AkumaGames.dll repository/package/
          cd repository/package
          zip -9 "../${PLUGIN_ZIP}" Jellyfin.Plugin.AkumaGames.dll
          cd ../..
          rm -rf repository/package

          mkdir -p "repository/${BUNDLE_NAME}/web" "repository/${BUNDLE_NAME}/unraid"
          cp Jellyfin.Plugin.AkumaGames/bin/Release/net9.0/Jellyfin.Plugin.AkumaGames.dll "repository/${BUNDLE_NAME}/"
          cp web/akuma-games-bridge.js "repository/${BUNDLE_NAME}/web/"
          cp web/akuma-games-card-click.js "repository/${BUNDLE_NAME}/web/"
          cp unraid/install-akuma-games-v0.2.3.6.sh "repository/${BUNDLE_NAME}/unraid/"
          chmod +x "repository/${BUNDLE_NAME}/unraid/install-akuma-games-v0.2.3.6.sh"
          cat > "repository/${BUNDLE_NAME}/LEIA-ME.txt" <<'TXT'
          AKUMA GAMES v0.2.3.6 - UNRAID / JELLYFIN 10.11.11

          CORREÇÃO DE DESEMPENHO DA RAIZ GAMES

          O problema não era o clique na biblioteca. O Jellyfin entrava na rota, mas
          ficava no loading enquanto procurava imagens herdadas e processava os milhares
          de diretórios para exibir apenas Arcade, NES, PlayStation etc.

          Esta versão usa duas otimizações:
          1. A raiz Games é desenhada imediatamente pelo cache leve do plugin.
          2. A sincronização cria folder.jpg local em cada sistema para acelerar também
             clientes nativos, como Android TV e Fire TV.

          INSTALAÇÃO
          1. Extraia este ZIP em uma pasta do Unraid.
          2. Abra o terminal nessa pasta.
          3. Execute:
             bash unraid/install-akuma-games-v0.2.3.6.sh
          4. No Jellyfin, execute uma vez a tarefa Sincronizar catálogo de games.
          5. Use Ctrl+Shift+R ou limpe os dados do site.

          TESTE
          Ao clicar na biblioteca Games, as categorias devem aparecer quase de imediato.
          No console do navegador execute:
             AkumaGamesCardClickBridge
          O campo version deve mostrar 0.2.3.6.
          TXT
          cd repository
          zip -9 -r "${BUNDLE_NAME}.zip" "${BUNDLE_NAME}"
          rm -rf "${BUNDLE_NAME}"
          cd ..

          CHECKSUM=$(md5sum "repository/${PLUGIN_ZIP}" | awk '{print $1}')
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S')
          cat > repository/manifest.json <<JSON
          [
            {
              "category": "General",
              "guid": "0fe9988e-21a1-4e59-aed7-4cf2e3858143",
              "name": "Akuma Games",
              "description": "Biblioteca nativa com cache rápido e launcher HTML5.",
              "owner": "danilostorm",
              "overview": "Raiz Games instantânea, categorias locais e games HTML5",
              "versions": [
                {
                  "checksum": "${CHECKSUM}",
                  "changelog": "Remove o loading longo da raiz Games usando cache do plugin e capas locais por sistema.",
                  "targetAbi": "10.11.11.0",
                  "sourceUrl": "https://raw.githubusercontent.com/danilostorm/jellyfin-plugin-akuma-games/main/repository/${PLUGIN_ZIP}",
                  "timestamp": "${TIMESTAMP}",
                  "version": "${VERSION}"
                }
              ]
            }
          ]
          JSON

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Akuma-Games-v0.2.3.6
          path: |
            repository/Jellyfin.Plugin.AkumaGames_0.2.3.6.zip
            repository/AkumaGames-v0.2.3.6-Unraid.zip
            repository/manifest.json

      - name: Publish repository files
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            repository/manifest.json \
            repository/Jellyfin.Plugin.AkumaGames_0.2.3.6.zip \
            repository/AkumaGames-v0.2.3.6-Unraid.zip
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git commit -m "build: publish Akuma Games plugin v0.2.3.6"
          git push
