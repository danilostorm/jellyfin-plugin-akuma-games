name: Build and publish Akuma Games

on:
  push:
    branches: [main]
    paths:
      - 'Jellyfin.Plugin.AkumaGames/**'
      - 'web/**'
      - 'unraid/**'
      - '.github/workflows/build-publish.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Validate web bridge syntax
        run: |
          node --check web/akuma-games-bridge.js
          node --check web/akuma-games-fast-root.js
          node --check web/akuma-games-card-click.js
          bash -n unraid/install-akuma-games-v0.2.3.8.sh

      - name: Build plugin
        run: |
          dotnet restore Jellyfin.Plugin.AkumaGames/Jellyfin.Plugin.AkumaGames.csproj
          dotnet build Jellyfin.Plugin.AkumaGames/Jellyfin.Plugin.AkumaGames.csproj -c Release --no-restore

      - name: Package plugin and persistent Unraid bridge
        run: |
          VERSION='0.2.3.8'
          PLUGIN_ZIP="Jellyfin.Plugin.AkumaGames_${VERSION}.zip"
          BUNDLE_NAME="AkumaGames-v${VERSION}-Unraid"

          mkdir -p repository/package
          cp Jellyfin.Plugin.AkumaGames/bin/Release/net9.0/Jellyfin.Plugin.AkumaGames.dll repository/package/
          cd repository/package
          zip -9 "../${PLUGIN_ZIP}" Jellyfin.Plugin.AkumaGames.dll
          cd ../..
          rm -rf repository/package

          mkdir -p "repository/${BUNDLE_NAME}/web" "repository/${BUNDLE_NAME}/unraid"
          cp Jellyfin.Plugin.AkumaGames/bin/Release/net9.0/Jellyfin.Plugin.AkumaGames.dll "repository/${BUNDLE_NAME}/"
          cp web/akuma-games-bridge.js "repository/${BUNDLE_NAME}/web/"
          cp web/akuma-games-fast-root.js "repository/${BUNDLE_NAME}/web/"
          cp web/akuma-games-card-click.js "repository/${BUNDLE_NAME}/web/"
          cp unraid/install-akuma-games-v0.2.3.8.sh "repository/${BUNDLE_NAME}/unraid/"
          chmod +x "repository/${BUNDLE_NAME}/unraid/install-akuma-games-v0.2.3.8.sh"
          cat > "repository/${BUNDLE_NAME}/LEIA-ME.txt" <<'TXT'
          AKUMA GAMES v0.2.3.8 - UNRAID / JELLYFIN 10.11.11

          BIBLIOTECA GAMES NO MESMO MODO DA PÁGINA DO PLUGIN

          Ao clicar na biblioteca Games pelo Jellyfin Web, esta versão não abre mais a
          listagem nativa lenta de categorias. Ela abre diretamente o catálogo rápido com:
          busca, sistemas, gêneros, cards dos 2.341 games e botão Jogar.

          A biblioteca nativa continua existindo no servidor para clientes como Android TV
          e Fire TV. O redirecionamento rápido é aplicado somente no Jellyfin Web.

          INSTALAÇÃO
          1. Extraia este ZIP no Unraid.
          2. Abra o terminal na pasta extraída.
          3. Execute:
             bash unraid/install-akuma-games-v0.2.3.8.sh
          4. Feche todas as abas do Jellyfin e teste em janela anônima.

          Não é necessário sincronizar os games novamente.

          DIAGNÓSTICO NO CONSOLE
             AkumaGamesFastRootBridge.status()

          O resultado deve mostrar version 0.2.3.8, cached true e games 2341.
          TXT
          cd repository
          zip -9 -r "${BUNDLE_NAME}.zip" "${BUNDLE_NAME}"
          rm -rf "${BUNDLE_NAME}"
          cd ..

          CHECKSUM=$(md5sum "repository/${PLUGIN_ZIP}" | awk '{print $1}')
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S')
          cat > repository/manifest.json <<JSON
          [
            {
              "category": "General",
              "guid": "0fe9988e-21a1-4e59-aed7-4cf2e3858143",
              "name": "Akuma Games",
              "description": "Biblioteca Games com catálogo público rápido e launcher HTML5.",
              "owner": "danilostorm",
              "overview": "A biblioteca abre o mesmo catálogo rápido da página do plugin",
              "versions": [
                {
                  "checksum": "${CHECKSUM}",
                  "changelog": "Substitui a raiz nativa lenta pelo catálogo público rápido com busca, filtros e botão Jogar.",
                  "targetAbi": "10.11.11.0",
                  "sourceUrl": "https://raw.githubusercontent.com/danilostorm/jellyfin-plugin-akuma-games/main/repository/${PLUGIN_ZIP}",
                  "timestamp": "${TIMESTAMP}",
                  "version": "${VERSION}"
                }
              ]
            }
          ]
          JSON

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Akuma-Games-v0.2.3.8
          path: |
            repository/Jellyfin.Plugin.AkumaGames_0.2.3.8.zip
            repository/AkumaGames-v0.2.3.8-Unraid.zip
            repository/manifest.json

      - name: Publish repository files
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            repository/manifest.json \
            repository/Jellyfin.Plugin.AkumaGames_0.2.3.8.zip \
            repository/AkumaGames-v0.2.3.8-Unraid.zip
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git commit -m "build: publish Akuma Games plugin v0.2.3.8"
          git push
