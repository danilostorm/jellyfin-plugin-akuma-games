name: Build and publish Akuma Games

on:
  push:
    branches: [main]
    paths:
      - 'Jellyfin.Plugin.AkumaGames/**'
      - '.github/workflows/build-publish.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build plugin
        run: |
          dotnet restore Jellyfin.Plugin.AkumaGames/Jellyfin.Plugin.AkumaGames.csproj
          dotnet build Jellyfin.Plugin.AkumaGames/Jellyfin.Plugin.AkumaGames.csproj -c Release --no-restore

      - name: Package plugin
        run: |
          mkdir -p repository/package
          cp Jellyfin.Plugin.AkumaGames/bin/Release/net9.0/Jellyfin.Plugin.AkumaGames.dll repository/package/
          cd repository/package
          zip -9 ../Jellyfin.Plugin.AkumaGames_0.1.0.0.zip Jellyfin.Plugin.AkumaGames.dll
          cd ../..
          rm -rf repository/package
          CHECKSUM=$(md5sum repository/Jellyfin.Plugin.AkumaGames_0.1.0.0.zip | awk '{print $1}')
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S')
          cat > repository/manifest.json <<JSON
          [
            {
              "category": "General",
              "guid": "0fe9988e-21a1-4e59-aed7-4cf2e3858143",
              "name": "Akuma Games",
              "description": "Sincroniza o catálogo Akumanimes como uma biblioteca nativa do Jellyfin.",
              "owner": "danilostorm",
              "overview": "Games nativos no Jellyfin, Android TV e Fire TV",
              "versions": [
                {
                  "checksum": "${CHECKSUM}",
                  "changelog": "Primeira versão com biblioteca nativa Games, capas e metadados.",
                  "targetAbi": "10.11.11.0",
                  "sourceUrl": "https://raw.githubusercontent.com/danilostorm/jellyfin-plugin-akuma-games/main/repository/Jellyfin.Plugin.AkumaGames_0.1.0.0.zip",
                  "timestamp": "${TIMESTAMP}",
                  "version": "0.1.0.0"
                }
              ]
            }
          ]
          JSON

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.AkumaGames_0.1.0.0
          path: repository/Jellyfin.Plugin.AkumaGames_0.1.0.0.zip

      - name: Publish repository files
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repository/manifest.json repository/Jellyfin.Plugin.AkumaGames_0.1.0.0.zip
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git commit -m "build: publish Akuma Games plugin v0.1.0.0"
          git push
