name: Build Akuma Games Android TV APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android-tv-overlay/**'
      - '.github/workflows/build-akuma-games-tv-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android-tv-overlay/**'
      - '.github/workflows/build-akuma-games-tv-apk.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Akuma Games integration
        uses: actions/checkout@v4
        with:
          path: integration

      - name: Checkout Jellyfin Android TV v0.19.9
        uses: actions/checkout@v4
        with:
          repository: jellyfin/jellyfin-androidtv
          ref: v0.19.9
          path: androidtv

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply Akuma Games Android TV overlay
        run: |
          cp -a integration/android-tv-overlay/app/. androidtv/app/
          python3 integration/android-tv-overlay/apply_overlay.py androidtv

      - name: Build debug APK
        working-directory: androidtv
        run: ./gradlew assembleDebug --stacktrace

      - name: Prepare APK
        run: |
          mkdir -p output
          APK=$(find androidtv/app/build/outputs/apk/debug -type f -name '*.apk' | head -n1)
          test -n "$APK"
          cp "$APK" output/Jellyfin-Akuma-Games-TV-v0.1.0-debug.apk
          sha256sum output/Jellyfin-Akuma-Games-TV-v0.1.0-debug.apk > output/SHA256SUMS.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin-Akuma-Games-TV-v0.1.0
          retention-days: 90
          if-no-files-found: error
          path: output/
