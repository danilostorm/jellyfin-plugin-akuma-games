<!DOCTYPE html>
<html>
<head><title>Akuma Games</title></head>
<body>
<div id="AkumaGamesConfigPage" data-role="page" class="page type-interior pluginConfigurationPage">
  <div data-role="content">
    <div class="content-primary">
      <h2>Akuma Games</h2>
      <p>O plugin sincroniza automaticamente a API Akumanimes e cria a biblioteca nativa Games.</p>
      <form id="AkumaGamesConfigForm">
        <div class="inputContainer"><label class="inputLabel inputLabelUnfocused" for="ApiUrl">URL da API</label><input id="ApiUrl" is="emby-input" type="text" /></div>
        <div class="inputContainer"><label class="inputLabel inputLabelUnfocused" for="LibraryName">Nome da biblioteca</label><input id="LibraryName" is="emby-input" type="text" /></div>
        <div class="checkboxContainer checkboxContainer-withDescription"><label><input id="SyncOnStartup" type="checkbox" is="emby-checkbox" /><span>Sincronizar ao iniciar</span></label></div>
        <button is="emby-button" type="submit" class="raised button-submit block"><span>Salvar</span></button>
      </form>
    </div>
  </div>
  <script type="text/javascript">
    (function () {
      const pluginId = '0fe9988e-21a1-4e59-aed7-4cf2e3858143';
      const page = document.querySelector('#AkumaGamesConfigPage');
      page.addEventListener('pageshow', async function () {
        Dashboard.showLoadingMsg();
        const config = await ApiClient.getPluginConfiguration(pluginId);
        page.querySelector('#ApiUrl').value = config.ApiUrl || '';
        page.querySelector('#LibraryName').value = config.LibraryName || 'Games';
        page.querySelector('#SyncOnStartup').checked = config.SyncOnStartup !== false;
        Dashboard.hideLoadingMsg();
      });
      page.querySelector('#AkumaGamesConfigForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        Dashboard.showLoadingMsg();
        const config = await ApiClient.getPluginConfiguration(pluginId);
        config.ApiUrl = page.querySelector('#ApiUrl').value;
        config.LibraryName = page.querySelector('#LibraryName').value;
        config.SyncOnStartup = page.querySelector('#SyncOnStartup').checked;
        await ApiClient.updatePluginConfiguration(pluginId, config);
        Dashboard.processPluginConfigurationUpdateResult();
        return false;
      });
    })();
  </script>
</div>
</body>
</html>
